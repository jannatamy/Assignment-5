<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>

    <!-- Tailwind and DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="min-h-[743px] max-w-[520px] bg-[#FFFFFF] rounded-md shadow-lg mx-auto mt-[78.5px]">
    
    <div class="logo w-[100px] mx-auto pt-8">
        <img src="./assets/github-logo.png" alt="">
    </div>

    <div class="pt-6 mx-auto text-center">
        <h2 class="font-semibold text-[#1F2937] text-2xl">GitHub Issues Tracker</h2>
        <p class="text-[#64748B]">Sign in to manage your issues</p>
    </div>

    <div>
    <div class="card bg-base-100 w-full max-w-[456px] shrink-0 mx-auto">
      <div class="card-body items-center">
        <fieldset class="fieldset">
          <label class="label text-neutral font-medium text-[16px] text=[#1F2937]">Username</label>
          <input id="input-nam" type="text" class="input font-normal p-4 w-[456px]" placeholder="Enter Username" />
          <label class="text-[#4A00FF] text-[14px]">Default: admin</label>

          <label class="label pt-3 text-neutral font-medium text-[16px] text=[#1F2937]">Password</label>
          <input id="input-pass" type="password" class="input font-normal p-4 w-[456px]" placeholder="Enter Password" />
          <label class="text-[#4A00FF] text-[14px]">Default: admin123</label>  

          <button id="login-btn" class="btn btn-primary bg-[##4A00FF] text-white mt-6">Sign In</button>

          <div class="flex pt-6 items-center gap-2">
            <div class="w-[208.5px]"><hr class="text-gray-200"></div>
            <div class="text-[#1F2937]">OR</div>
            <div class="w-[208.5px]"><hr class="text-gray-200"></div>
          </div>

          <div class="text-center mt-6">
            <h5 class="pb-2 font-medium text-[14px] text-gray-400">Demo Credentials:</h5>

            <div class="bg-gray-50 rounded-lg pt-6 pb-6">
                <p><span class="font-bold text-[16px]">Username:</span> <span class="text-[16px]">admin</span> </p>
                <p><span class="font-bold text-[16px]">Password:</span> <span class="text-[16px]">admin123</span></p>
            </div>
          </div>
        </fieldset>
      </div>
    </div>
  </div>
</div>
    </div>

    <script src="./script/login.js"></script>

</body>
</html>
