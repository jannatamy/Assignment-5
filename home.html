<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home || GitHub Issues Tracker</title>

    <!-- Tailwind and DaisyUI CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>

</head>
<body class="bg-gray-100">

    <!-- navbar -->

    <div class="navbar bg-white shadow-sm px-20">
        <div class="flex-1">
            <a href="home.html" class="flex items-center gap-1 font-semibold text-2xl">
                <img class="w-9 h-[37px]" src="./assets/github-logo.png" alt=""> GitHub Issues Tracker</a>
        </div>

        <div class="flex gap-2">

            <input id="searchInput" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
            
            <div class="dropdown dropdown-end">
                <button id="searchBtn" onclick="search()" class="btn btn-primary w-full sm:w-auto"><i class="fa-solid fa-plus"></i> New Issue</button>
            </div>
        </div>
    </div>

    <main>

    <!-- button section -->

    <div id="buttonContainer" class="max-w-7xl flex justify-center md:justify-start mx-auto bg-white rounded-md p-4 py-5 shadow-md mt-2 space-x-2 lg:mt-15">
        <button class="btn-nav btn btn-primary">All</button>
        <button class="btn-nav btn">Open</button>
        <button class="btn-nav btn">Closed</button>
    </div>


    <!-- issue section -->

    <section class="max-w-7xl mx-auto md:mt-4 bg-white">
        <div
            class="md:flex space-y-5 md:space-y-0 justify-between items-center py-5 bg-white p-5 border border-gray-200 rounded-t-md">
            <div class="flex gap-3 items-center">

                <div>
                    <img src="./assets/Aperture.png" alt="">
                </div>

                <div>
                    <h1 class="font-bold"><span id="totalCount">50</span> Issues </h1>
                    <p class="text-gray-500">Track and manage your project issues</p>
                </div>

            </div>
            <div class="flex items-center gap-5">

                <div class="flex items-center gap-1">
                    <p class="p-2 rounded-full inline-block bg-green-800"></p>
                    <p>Open</p>
                </div>

                <div class="flex items-center gap-1">
                    <p class="p-2 rounded-full inline-block bg-purple-900"></p>
                    <p>Closed</p>
                </div>

            </div>
        </div>
    </section>

    <!-- loading section -->

    <section id="loading" class="flex justify-center mx-auto my-10 hidden">
        <span class="loading loading-bars loading-xl"></span>
    </section>


    <!-- modal section -->

    <dialog id="modal" class="modal modal-bottom sm:modal-middle"> </dialog>

    <!-- card section -->

    <section id="issueContainer" class="mt-5 grid lg:grid-cols-4 gap-5 p-4 mx-auto max-w-7xl bg-white"></section>

    </main>




    <script src="./script/home.js"></script>

</body>
</html>
